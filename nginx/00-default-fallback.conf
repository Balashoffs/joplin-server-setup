# Default server: ловит запросы с Host, не совпадающим ни с одним server_name
# (например, hello-vanilla.ru, www.hello-vanilla.ru, прямой запрос по IP).
# Отдаёт стандартную nginx welcome-страницу из /var/www/html/.
#
# 443-блок использует сертификат example.com — единственный валидный
# Let's Encrypt-сертификат на этом VPS. Браузеры будут жаловаться на CN
# mismatch при заходе на чужой домен — это ожидаемо и желательно: «не наш
# домен → не наша зона ответственности → пусть видят nginx default».
#
# Префикс `00-` гарантирует, что этот файл первый по алфавиту в
# sites-enabled/ — критично если другой include использует include-by-glob.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.nginx-debian.html index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/html;
    index index.nginx-debian.html index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
